name: CI/CD pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
  
    stages:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup python
        uses: actions/python@v4
        with:
          python-version: "3.10"
        
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
        
      - name: Run pytest
        run: pytest -v
      
      - name: Run pylint
        run: pylint app.py